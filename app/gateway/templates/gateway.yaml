apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-gateway
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: istio
  addresses:
    - type: Hostname
      value: {{ .Values.gateway.serviceName }}.{{ .Values.gateway.namespace }}.svc.cluster.local
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: {{ .Values.host | quote }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- if .Values.tls.enabled }}
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ .Values.host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
